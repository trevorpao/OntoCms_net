name: ontocms_net

services:
  web:
    build:
      context: ../..
      dockerfile: conf/docker/Dockerfile
    depends_on:
      db:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ONTOCMS_APP_ENV}
      ASPNETCORE_URLS: http://+:8080;https://+:8443
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/loc.f3cms.com.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${ONTOCMS_DEV_CERT_PASSWORD}
      ConnectionStrings__DefaultConnection: Server=${ONTOCMS_DB_HOST},1433;Database=${ONTOCMS_DB_NAME};User Id=${ONTOCMS_DB_USER};Password=${ONTOCMS_DB_PASSWORD};TrustServerCertificate=True
    volumes:
      - ../iis:/https:ro
    ports:
      - ${ONTOCMS_HTTP_PORT}:8080
      - 4433:8443
    restart: unless-stopped

  cli:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /src
    command:
      - tail
      - -f
      - /dev/null
    depends_on:
      db:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ONTOCMS_APP_ENV}
      ConnectionStrings__DefaultConnection: Server=${ONTOCMS_DB_HOST},1433;Database=${ONTOCMS_DB_NAME};User Id=${ONTOCMS_DB_USER};Password=${ONTOCMS_DB_PASSWORD};TrustServerCertificate=True
    volumes:
      - ../..:/src
      - nuget-packages:/root/.nuget/packages
      - cli-bin:/src/src/cli/bin
      - cli-obj:/src/src/cli/obj
      - web-bin:/src/src/public/bin
      - web-obj:/src/src/public/obj
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${ONTOCMS_DB_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - ${ONTOCMS_DB_PORT}:1433
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  mssql-data:
  nuget-packages:
  cli-bin:
  cli-obj:
  web-bin:
  web-obj: